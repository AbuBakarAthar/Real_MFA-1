name: Deploy to VPS

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Compute image metadata
        id: meta
        shell: bash
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            SHA_TAG="${{ github.event.workflow_run.head_sha }}"
          else
            SHA_TAG="${{ github.sha }}"
          fi
          echo "owner_lc=$OWNER_LC" >> "$GITHUB_OUTPUT"
          echo "sha_tag=$SHA_TAG" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/$OWNER_LC/real_mfa:$SHA_TAG" >> "$GITHUB_OUTPUT"

      - name: Validate required deploy secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          APP_PATH: ${{ secrets.APP_PATH }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        run: |
          set -e
          [ -n "$SSH_HOST" ] || (echo "Missing secret: SSH_HOST" && exit 1)
          [ -n "$SSH_USER" ] || (echo "Missing secret: SSH_USER" && exit 1)
          [ -n "$SSH_PRIVATE_KEY" ] || (echo "Missing secret: SSH_PRIVATE_KEY" && exit 1)
          [ -n "$APP_PATH" ] || (echo "Missing secret: APP_PATH" && exit 1)
          [ -n "$GHCR_PAT" ] || (echo "Missing secret: GHCR_PAT" && exit 1)
          [ -n "$GHCR_USERNAME" ] || (echo "Missing secret: GHCR_USERNAME" && exit 1)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: ./Real_MFA
          file: ./Real_MFA/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/real_mfa:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          envs: IMAGE
          script: |
            set -e
            cd ${{ secrets.APP_PATH }}
            echo "Deploying image: $IMAGE"
            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin
            export IMAGE=$IMAGE
            docker compose --env-file .env.docker -f docker-compose.ubuntu.yml pull web celery_worker celery_beat
            docker compose --env-file .env.docker -f docker-compose.ubuntu.yml up -d --remove-orphans
            docker image prune -f
            docker compose --env-file .env.docker -f docker-compose.ubuntu.yml ps
            curl -fsS http://127.0.0.1/healthz/ || (echo "Health check failed" && exit 1)
